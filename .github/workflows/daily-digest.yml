name: Daily Tech News Digest

on:
  schedule:
    # 每日 02:00 UTC = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      deliver:
        description: 'Delivery channels (telegram,email,wechat)'
        required: false
        default: ''
      trends:
        description: 'Run trend analysis (true/false)'
        required: false
        default: 'true'

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
  LLM_MODEL: ${{ vars.LLM_MODEL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  EMAIL_TO: ${{ secrets.EMAIL_TO }}
  WEIXIN_ILINK_HOOK: ${{ secrets.WEIXIN_ILINK_HOOK }}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch news
        run: |
          set -e
          CMD="python scripts/fetch_news.py"
          if [ "${{ github.event.inputs.trends || 'true' }}" = "true" ]; then
            CMD="$CMD --trends"
          fi
          DELIVER="${{ github.event.inputs.deliver }}"
          if [ -n "$DELIVER" ]; then
            CMD="$CMD --deliver=$DELIVER"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Commit & push
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add daily/
          if ! git diff --staged --quiet; then
            git commit -m "📰 $(date +'%Y-%m-%d') 技术快讯 [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
